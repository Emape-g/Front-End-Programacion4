<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Usuarios</title>
    <link rel="stylesheet" href="lista.css">
</head>
<body>
    <div class="contenedor">
        <h2>Gestión de Usuarios</h2>
        
        <div class="buscador">
            <input type="text" id="buscarUsuario" placeholder="Buscar por nombre de usuario...">
            <button id="btnBuscar">Buscar</button>
        </div>

        <table id="tablaUsuarios">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Usuario</th>
                    <th>Bloqueado</th>
                    <th>Apellido</th>
                    <th>Nombre</th>
                    <th>Bloquear</th>
                    <th>Desbloquear</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
                </tbody>
        </table>
    </div>

    <script src="lista.js"></script>
</body>
</html>
